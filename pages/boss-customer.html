<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户利润贡献 - 捷隆纺织</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="../js/page-guard.js"></script>
  <script src="../js/components.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      padding: 20px 16px;
      color: white;
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    .header-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }
    .action-bar {
      background: white;
      padding: 12px 16px;
      display: flex;
      justify-content: flex-end;
    }
    .action-btn {
      padding: 8px 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chart-section {
      background: white;
      margin: 16px;
      border-radius: 16px;
      padding: 20px;
    }
    .chart-title {
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      margin: 0 0 16px 0;
    }
    .chart-placeholder {
      height: 200px;
      background: #f9fafb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chart-placeholder i {
      font-size: 40px;
      color: #9ca3af;
      opacity: 0.5;
    }
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.3);
      border: 2px solid #3b82f6;
    }
    .legend-label {
      font-size: 12px;
      color: #6b7280;
    }
    .table-section {
      background: white;
      margin: 0 16px 16px;
      border-radius: 16px;
      overflow: hidden;
    }
    .table-header {
      padding: 16px;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-title {
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      margin: 0;
    }
    .table-info {
      font-size: 12px;
      color: #6b7280;
    }
    .table-wrapper {
      overflow-x: auto;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      padding: 14px 12px;
      text-align: left;
      font-size: 13px;
      border-bottom: 1px solid #f3f4f6;
    }
    .data-table th {
      background: #f9fafb;
      font-weight: 600;
      color: #6b7280;
    }
    .data-table td {
      color: #374151;
    }
    .data-table tr:hover {
      background: #f9fafb;
    }
    .customer-name {
      font-weight: 600;
      color: #3b82f6;
      cursor: pointer;
    }
    .customer-name:hover {
      text-decoration: underline;
    }
    .profit-high {
      color: #10b981;
      font-weight: 600;
    }
    .profit-medium {
      color: #f59e0b;
      font-weight: 600;
    }
    .profit-low {
      color: #dc2626;
      font-weight: 600;
    }
    .cards-section {
      padding: 0 16px 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #1f2937;
      margin: 0;
    }
    .stat-label {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="header-title">客户利润贡献</h1>
    <p class="header-subtitle">分析客户价值与贡献</p>
  </div>

  <div class="action-bar">
    <button class="action-btn" onclick="exportReport()">
      <i class="fas fa-download"></i> 导出报表
    </button>
  </div>

  <div class="cards-section">
    <div class="stat-card">
      <p class="stat-value">28</p>
      <p class="stat-label">活跃客户</p>
    </div>
    <div class="stat-card">
      <p class="stat-value">$2.8M</p>
      <p class="stat-label">总销售额</p>
    </div>
  </div>

  <div class="chart-section">
    <h3 class="chart-title">客户价值分布</h3>
    <div class="chart-placeholder">
      <i class="fas fa-chart-scatter"></i>
    </div>
    <div class="chart-legend">
      <div class="legend-item">
        <span class="legend-circle"></span>
        <span class="legend-label">气泡大小=订单量</span>
      </div>
    </div>
  </div>

  <div class="table-section">
    <div class="table-header">
      <p class="table-title">客户列表</p>
      <span class="table-info">共 28 个客户</span>
    </div>
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>客户名称</th>
            <th>销售额</th>
            <th>毛利</th>
            <th>毛利率</th>
            <th>续单率</th>
            <th>平均账期</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="customer-name" onclick="window.parent.loadPage('pages/dashboard.html')">ABC Trading</td>
            <td>$520,000</td>
            <td class="profit-high">$130,000</td>
            <td class="profit-high">25.0%</td>
            <td>95%</td>
            <td>35天</td>
          </tr>
          <tr>
            <td class="customer-name" onclick="window.parent.loadPage('pages/dashboard.html')">Euro Textile</td>
            <td>$480,000</td>
            <td class="profit-high">$105,600</td>
            <td class="profit-medium">22.0%</td>
            <td>88%</td>
            <td>55天</td>
          </tr>
          <tr>
            <td class="customer-name" onclick="window.parent.loadPage('pages/dashboard.html')">USA Apparel</td>
            <td>$360,000</td>
            <td class="profit-medium">$54,000</td>
            <td class="profit-low">15.0%</td>
            <td>72%</td>
            <td>42天</td>
          </tr>
          <tr>
            <td class="customer-name" onclick="window.parent.loadPage('pages/dashboard.html')">XYZ Fashion</td>
            <td>$290,000</td>
            <td class="profit-high">$69,600</td>
            <td class="profit-high">24.0%</td>
            <td>92%</td>
            <td>30天</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
<script>
function exportReport() {
  var rows = [];
  var table = document.querySelector('.data-table');
  if (!table) return;

  // 读取表头
  var headers = [];
  table.querySelectorAll('thead th').forEach(function(th) {
    headers.push(th.textContent.trim());
  });
  rows.push(headers);

  // 读取数据行
  table.querySelectorAll('tbody tr').forEach(function(tr) {
    var cells = [];
    tr.querySelectorAll('td').forEach(function(td) {
      cells.push(td.textContent.trim());
    });
    rows.push(cells);
  });

  // 用 ExportExcel 导出
  if (typeof ExportExcel !== 'undefined') {
    var data = rows.slice(1).map(function(row) {
      var obj = {};
      headers.forEach(function(h, i) { obj[h] = row[i] || ''; });
      return obj;
    });
    ExportExcel.download(data, '客户利润贡献报表_' + new Date().toISOString().split('T')[0]);
  } else {
    // 回退：生成 CSV 下载
    var csv = '﻿' + rows.map(function(r) { return r.join(','); }).join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '客户利润贡献报表_' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
  }

  if (typeof Toast !== 'undefined') Toast.success('报表已导出');
}
</script>
</body>
</html>
