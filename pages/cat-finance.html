<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>财务管理 - 捷隆纺织</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="../js/page-guard.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/data-service.js"></script>
  <script src="../js/permissions.js"></script>
  <style>
    :root {
      --bg: #eef0f4; --card: #ffffff; --text: #1e293b; --text-secondary: #64748b;
      --border: #e8ecf1; --shadow-sm: 0 1px 2px rgba(0,0,0,.03), 0 2px 8px rgba(0,0,0,.04);
      --shadow-md: 0 1px 2px rgba(0,0,0,.04), 0 6px 20px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    .header {
      background: linear-gradient(155deg, #0f2744 0%, #1b3d62 40%, #1e4d7b 100%);
      padding: 24px 20px 22px; color: white; position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; top: -50px; right: -30px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(255,255,255,.06) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header-title { font-size: 20px; font-weight: 700; margin: 0; position: relative; z-index: 1; }
    .header-subtitle { font-size: 12.5px; color: rgba(255,255,255,.6); margin-top: 5px; position: relative; z-index: 1; }
    .quick-menu { padding: 16px 14px; }
    .quick-title {
      font-size: 14px; font-weight: 700; color: var(--text); margin: 0 0 12px 0;
      display: flex; align-items: center; gap: 7px;
    }
    .quick-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }
    .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .quick-item {
      background: var(--card); border-radius: 14px; padding: 18px 8px 15px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; transition: all .25s cubic-bezier(.4,0,.2,1);
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .quick-item::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(37,99,235,.03) 0%, transparent 70%);
      opacity: 0; transition: opacity .25s;
    }
    .quick-item:active { transform: scale(.96); }
    .quick-item:active::after { opacity: 1; }
    .quick-icon {
      width: 48px; height: 48px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 21px; position: relative; z-index: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .quick-label { font-size: 12px; color: var(--text); text-align: center; font-weight: 500; position: relative; z-index: 1; }
    .section-spacer { height: 6px; }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="header-title">💰 财务管理</h1>
    <p class="header-subtitle">应收 · 回款 · 利润 · 汇率 · 风控</p>
  </div>
  <div class="quick-menu">
    <h3 class="quick-title">核心工具</h3>
    <div class="quick-grid">
      <div class="quick-item" onclick="nav('pages/finance-ar.html')">
        <div class="quick-icon" style="background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#1d4ed8;"><i class="fas fa-chart-line"></i></div>
        <span class="quick-label">应收看板</span>
      </div>
      <div class="quick-item" onclick="nav('pages/finance-payment.html')">
        <div class="quick-icon" style="background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#047857;"><i class="fas fa-check-circle"></i></div>
        <span class="quick-label">回款核销</span>
      </div>
      <div class="quick-item" onclick="nav('pages/finance-profit.html')">
        <div class="quick-icon" style="background:linear-gradient(135deg,#fef3c7,#fde68a);color:#b45309;"><i class="fas fa-calculator"></i></div>
        <span class="quick-label">利润分析</span>
      </div>
    </div>
    <div class="section-spacer"></div>
    <h3 class="quick-title">更多工具</h3>
    <div class="quick-grid">
      <div class="quick-item" onclick="nav('pages/finance-rate.html')">
        <div class="quick-icon" style="background:linear-gradient(135deg,#e0e7ff,#c7d2fe);color:#4338ca;"><i class="fas fa-exchange-alt"></i></div>
        <span class="quick-label">汇率管理</span>
      </div>
      <div class="quick-item" onclick="nav('pages/finance-reconcile.html')">
        <div class="quick-icon" style="background:linear-gradient(135deg,#fce7f3,#fbcfe8);color:#be185d;"><i class="fas fa-balance-scale"></i></div>
        <span class="quick-label">订单对账</span>
      </div>
      <div class="quick-item" onclick="nav('pages/finance-risk.html')">
        <div class="quick-icon" style="background:linear-gradient(135deg,#fee2e2,#fecaca);color:#b91c1c;"><i class="fas fa-shield-alt"></i></div>
        <span class="quick-label">风险预警</span>
      </div>
      <div class="quick-item" onclick="nav('pages/finance-overseas.html')">
        <div class="quick-icon" style="background:linear-gradient(135deg,#cffafe,#a5f3fc);color:#0e7490;"><i class="fas fa-globe"></i></div>
        <span class="quick-label">海外仓</span>
      </div>
    </div>
  </div>
  <script>function nav(p){if(window.parent&&window.parent!==window&&typeof window.parent.loadPage==='function'){window.parent.loadPage(p)}else{window.location.href=p}}
    document.addEventListener('DOMContentLoaded',function(){
      if(!window.Permission)return;
      document.querySelectorAll('.quick-item').forEach(item=>{
        var label=item.querySelector('.quick-label');if(!label)return;
        if(!Permission.canSeeCard(label.textContent.trim()))item.style.display='none';
      });
      document.querySelectorAll('.quick-menu').forEach(function(m){
        if(m.querySelectorAll('.quick-item:not([style*="display:none"])').length===0)m.style.display='none';
      });
    });
  </script>
</body>
</html>
