<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:sans-serif;background:linear-gradient(135deg,#1e3a5f,#2d5a87);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;padding:28px 22px;width:100%;max-width:360px;text-align:center}
    .logo{width:56px;height:56px;background:linear-gradient(135deg,#1e3a5f,#2d5a87);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#fff;font-size:22px;font-weight:700}
    h2{font-size:18px;color:#1f2937;margin-bottom:4px}
    p{font-size:13px;color:#6b7280;margin-bottom:20px}
    input{width:100%;height:46px;padding:0 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:12px}
    .btn{display:block;width:100%;height:46px;line-height:46px;text-align:center;background:linear-gradient(135deg,#1e3a5f,#2d5a87);color:#fff;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;cursor:pointer;border:none}
    .err{color:#dc2626;font-size:13px;margin-bottom:12px;display:none}
    .ok{color:#10b981;font-size:13px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">JL</div>
    <h2>捷隆纺织</h2>
    <p>员工登录</p>
    <div class="err" id="err">账号或密码错误</div>
    <input id="u" type="text" placeholder="账号">
    <input id="p" type="password" placeholder="密码">
    <button class="btn" onclick="doLogin()">登录</button>
    <div class="ok" id="ok">登录成功！跳转中...</div>
    <div style="margin-top:14px;font-size:12px;color:#6b7280">测试: admin@example.com / 123456<br>测试: staff@example.com / 123456</div>
  </div>
  <script>
    function doLogin() {
      var u = document.getElementById('u').value.trim();
      var pw = document.getElementById('p').value.trim();
      if (!u || !pw) { document.getElementById('err').style.display='block'; document.getElementById('err').textContent='请输入账号密码'; return; }
      var users = JSON.parse(localStorage.getItem('adminUsers')||'[]');
      if (users.length===0) {
        users=[{email:'admin@example.com',password:'123456',username:'Admin',role:'超级管理员'},{email:'staff@example.com',password:'123456',username:'Staff',role:'外贸业务员'}];
        localStorage.setItem('adminUsers',JSON.stringify(users));
      }
      var user = users.find(function(x){return x.email===u&&x.password===pw});
      if (!user) { document.getElementById('err').style.display='block'; document.getElementById('err').textContent='账号或密码错误，共'+users.length+'个用户'; return; }
      document.getElementById('err').style.display='none';
      document.getElementById('ok').style.display='block';
      localStorage.setItem('currentUser',JSON.stringify({email:user.email,username:user.username,role:user.role}));
      localStorage.setItem('isLoggedIn','true');
      setTimeout(function(){ location.href='mobile.html'; }, 1000);
    }
  </script>
</body>
</html>
