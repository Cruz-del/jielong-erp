<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工登录 - 捷隆纺织</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-attachment: fixed;
    }
    .login-wrapper {
      display: flex;
      gap: 60px;
      align-items: center;
      max-width: 1000px;
      width: 100%;
    }
    .login-info {
      color: white;
      flex: 1;
      padding-right: 40px;
    }
    .info-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .info-desc {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .info-features {
      list-style: none;
    }
    .info-features li {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
    }
    .info-features i {
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .login-container {
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
    }
    .logo-section {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: white;
      font-weight: 700;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(30, 58, 95, 0.4);
    }
    .company-name {
      font-size: 22px;
      font-weight: 700;
      color: #1f2937;
      margin: 0;
    }
    .login-title {
      font-size: 15px;
      color: #6b7280;
      margin-top: 6px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 10px;
      display: block;
    }
    .form-input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
      transition: all 0.3s;
      background: #fafafa;
      min-height: 50px;
    }
    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .form-input::placeholder {
      color: #9ca3af;
    }
    .form-input.error {
      border-color: #dc2626;
    }
    .password-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #6b7280;
      cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #3b82f6;
    }
    .forgot-link {
      font-size: 14px;
      color: #3b82f6;
      cursor: pointer;
      font-weight: 500;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(30, 58, 95, 0.4);
    }
    
    .logged-in-banner {
      background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
      border: 1px solid #10b981;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logged-in-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #065f46;
      font-size: 14px;
    }
    
    .logged-in-info i {
      font-size: 24px;
      color: #10b981;
    }
    
    .logged-in-info strong {
      color: #065f46;
      font-weight: 600;
    }
    
    .logged-in-banner .logout-btn {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .logged-in-banner .logout-btn:hover {
      background: #fee2e2;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 58, 95, 0.5);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 32px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .divider-text {
      padding: 0 20px;
      font-size: 14px;
      color: #9ca3af;
      font-weight: 500;
    }
    .social-buttons {
      display: flex;
      gap: 16px;
    }
    .social-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      background: white;
    }
    .social-btn:hover {
      border-color: #d1d5db;
      background: #f9fafb;
      transform: translateY(-1px);
    }
    .social-btn.wechat {
      border-color: #10b981;
      color: #10b981;
    }
    .social-btn.wechat:hover {
      background: #ecfdf5;
    }
    .social-btn.dingding {
      border-color: #3b82f6;
      color: #3b82f6;
    }
    .social-btn.dingding:hover {
      background: #eff6ff;
    }
    .social-btn i {
      font-size: 20px;
    }
    .social-btn span {
      font-size: 14px;
      font-weight: 500;
    }
    .register-link {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: #6b7280;
    }
    .register-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .error-message.active {
      display: flex;
    }
    .error-message i {
      flex-shrink: 0;
    }
    .test-account {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 16px;
      margin-top: 20px;
      border-left: 4px solid #3b82f6;
    }
    .test-account-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .test-account-item {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .test-account-item strong {
      color: #374151;
    }
    
    /* 响应式适配 */
    /* 手机端适配 - 竖版单栏布局 */
    @media (max-width: 900px) {
      body {
        padding: 16px;
        align-items: flex-start;
        padding-top: 40px;
      }
      .login-wrapper {
        flex-direction: column;
        gap: 24px;
        max-width: 100%;
      }
      .login-info {
        text-align: center;
        padding-right: 0;
        display: none; /* 手机端隐藏左侧介绍 */
      }
      .login-info-mobile {
        display: block; /* 手机端显示简化版本 */
      }
      .info-title {
        font-size: 24px;
        margin-bottom: 8px;
      }
      .info-features {
        display: none; /* 手机端隐藏功能列表 */
      }
      .login-container {
        padding: 28px 24px;
        max-width: 100%;
        border-radius: 16px;
      }
      .logo {
        width: 56px;
        height: 56px;
        font-size: 20px;
      }
      .company-name {
        font-size: 20px;
      }
      .login-title {
        font-size: 14px;
      }
    }
    
    /* 超小屏幕进一步优化 */
    @media (max-width: 375px) {
      body {
        padding: 12px;
        padding-top: 24px;
      }
      .login-container {
        padding: 24px 20px;
      }
      .form-input {
        padding: 12px 16px;
        min-height: 48px;
      }
      .login-btn {
        padding: 14px;
        font-size: 15px;
      }
      .logged-in-banner {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
      .logged-in-banner .logout-btn {
        width: 100%;
        justify-content: center;
      }
    }
    
    /* 触摸优化 - 增大点击热区 */
    @media (pointer: coarse) {
      .form-input,
      .login-btn,
      .social-btn,
      .form-checkbox {
        min-height: 48px;
      }
      .social-btn {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- 左侧信息展示区域 -->
    <div class="login-info">
      <h1 class="info-title">外贸订单管理系统</h1>
      <p class="info-desc">
        专业的外贸订单全流程管理平台，助力企业高效处理订单、追踪进度、管理财务。
      </p>
      <ul class="info-features">
        <li><i class="fas fa-check-circle"></i> 订单全流程跟踪</li>
        <li><i class="fas fa-check-circle"></i> 智能财务对账</li>
        <li><i class="fas fa-check-circle"></i> AI智能助手</li>
        <li><i class="fas fa-check-circle"></i> 实时数据报表</li>
      </ul>
    </div>

    <!-- 右侧登录表单 -->
    <div class="login-container">
      <div class="logo-section">
        <div class="logo">JL</div>
        <p class="company-name">捷隆纺织</p>
        <p class="login-title">员工登录</p>
      </div>

      <!-- 已登录提示 -->
      <div class="logged-in-banner" id="loggedInBanner" style="display: none;">
        <div class="logged-in-info">
          <i class="fas fa-user-circle"></i>
          <span>当前登录：<strong id="currentUserName">管理员</strong></span>
        </div>
        <button class="logout-btn" onclick="handleLogoutAndRelogin()">
          <i class="fas fa-sign-out-alt"></i>
          <span>切换账号</span>
        </button>
      </div>

      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i> 账号或密码错误
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">账号</label>
          <input type="text" class="form-input" id="username" placeholder="请输入账号">
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="password" placeholder="请输入密码">
        </div>

        <div class="password-row">
          <label class="checkbox-label">
            <input type="checkbox">
            <span>记住密码</span>
          </label>
          <span class="forgot-link">忘记密码?</span>
        </div>

        <button type="button" class="login-btn" onclick="handleLogin(event)">登录</button>
      </form>

      <!-- 测试账号信息 -->
      <div class="test-account">
        <div class="test-account-title">测试账号</div>
        <div class="test-account-item"><strong>admin@example.com</strong> / 123456 (管理员)</div>
        <div class="test-account-item"><strong>staff@example.com</strong> / 123456 (跟单员)</div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">其他登录方式</span>
        <div class="divider-line"></div>
      </div>

      <div class="social-buttons">
        <button class="social-btn wechat">
          <i class="fab fa-weixin"></i>
          <span>企业微信</span>
        </button>
        <button class="social-btn dingding">
          <i class="fab fa-dingding"></i>
          <span>钉钉</span>
        </button>
      </div>

      <div class="register-link">
        还没有账号？<a href="#" onclick="showRegister()">立即注册</a>
      </div>
    </div>
  </div>

  <!-- 注册表单 -->
  <div class="login-container" id="registerForm" style="display: none;">
    <div class="logo-section">
      <div class="logo">JL</div>
      <p class="company-name">捷隆纺织</p>
      <p class="login-title">员工注册</p>
    </div>

    <div class="error-message" id="registerError">
      <i class="fas fa-exclamation-circle"></i> 注册失败
    </div>

    <form id="registerFormData">
      <div class="form-group">
        <label class="form-label">姓名</label>
        <input type="text" class="form-input" id="registerName" placeholder="请输入姓名">
      </div>

      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" id="registerEmail" placeholder="请输入邮箱">
      </div>

      <div class="form-group">
        <label class="form-label">手机号 <span style="color:#ef4444;">*</span></label>
        <input type="tel" class="form-input" id="registerPhone" placeholder="请输入手机号（用于唯一识别）" required>
        <div style="font-size:11px;color:#9ca3af;margin-top:4px;">一个手机号只能注册一次</div>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="registerPassword" placeholder="请输入密码（至少6位）">
      </div>

      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input type="password" class="form-input" id="registerConfirmPassword" placeholder="请再次输入密码">
      </div>

      <button type="button" class="login-btn" onclick="handleRegister()">注册</button>
    </form>

    <div class="register-link">
      已有账号？<a href="#" onclick="showLogin()">立即登录</a>
    </div>
  </div>

  <script>
    // ======================================================
    // 登录页脚本（v2 - 使用统一 Auth 模块）
    // ======================================================

    // 初始化测试用户（localStorage 回退用）
    function initTestUsers() {
      const existingUsers = JSON.parse(localStorage.getItem('adminUsers') || '[]');
      if (existingUsers.length === 0) {
        const testUsers = [
          { id: 1, email: 'admin@example.com', password: '123456', username: '超级管理员', role: '超级管理员' },
          { id: 2, email: 'manager@example.com', password: '123456', username: '跟单主管', role: '跟单主管' },
          { id: 3, email: 'staff@example.com', password: '123456', username: '跟单员', role: '跟单员' },
          { id: 4, email: 'boss@example.com', password: '123456', username: '老板', role: '老板' }
        ];
        localStorage.setItem('adminUsers', JSON.stringify(testUsers));
        console.log('✅ 已初始化测试用户');
      }
    }

    // 检查当前登录状态
    function checkCurrentLogin() {
      try {
        var user = JSON.parse(sessionStorage.getItem('currentUser'));
        if (user) {
          document.getElementById('currentUserName').textContent = user.username || user.email;
          document.getElementById('loggedInBanner').style.display = 'flex';
        }
      } catch(e) {}
    }

    function handleLogoutAndRelogin() {
      sessionStorage.clear();
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'logout' }, '*');
      }
      document.getElementById('loggedInBanner').style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
      initTestUsers();
      checkCurrentLogin();
    });

    // 跳转到主应用
    function navigateToApp(userInfo) {
      setTimeout(() => {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'loginSuccess', user: userInfo }, '*');
        } else {
          window.location.href = '../index.html';
        }
      }, 100);
    }

    // 处理登录（纯本地验证）
    function handleLogin() {
      alert('按钮工作了！'); // 临时测试
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value.trim();

      if (!username || !password) { showError('请输入账号和密码'); return; }

      var users = JSON.parse(localStorage.getItem('adminUsers') || '[]');
      var user = users.find(function(u) { return u.email === username && u.password === password; });

      if (user) {
        var info = { id: user.id || Date.now(), email: user.email, username: user.username || username, role: user.role || '外贸业务员', lastLogin: new Date().toISOString() };
        sessionStorage.setItem('currentUser', JSON.stringify(info));
        sessionStorage.setItem('isLoggedIn', 'true');
        hideError();
        navigateToApp(info);
      } else {
        showError('账号或密码错误');
      }
    }

    // 处理注册
    function handleRegister() {
      var name = document.getElementById('registerName').value.trim();
      var email = document.getElementById('registerEmail').value.trim();
      var phone = document.getElementById('registerPhone').value.trim();
      var password = document.getElementById('registerPassword').value;
      var confirmPassword = document.getElementById('registerConfirmPassword').value;

      if (!name || !email || !phone || !password || !confirmPassword) { showRegisterError('请填写所有字段'); return; }
      if (!/^1[3-9]\d{9}$/.test(phone)) { showRegisterError('请输入有效的手机号码'); return; }
      if (password !== confirmPassword) { showRegisterError('两次输入的密码不一致'); return; }
      if (password.length < 6) { showRegisterError('密码至少需要6位'); return; }

      // 检查邮箱是否已注册
      var users = JSON.parse(localStorage.getItem('adminUsers') || '[]');
      if (users.find(function(u) { return u.email === email; })) {
        showRegisterError('该邮箱已注册'); return;
      }
      if (users.find(function(u) { return u.phone === phone; })) {
        showRegisterError('该手机号已注册'); return;
      }

      // 保存到本地
      users.push({ email: email, password: password, username: name, phone: phone, role: '外贸业务员' });
      localStorage.setItem('adminUsers', JSON.stringify(users));
      alert('注册成功！请登录');
      showLogin();
    }

    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
      el.classList.add('active');
    }

    function hideError() {
      document.getElementById('errorMessage').classList.remove('active');
    }

    function showRegisterError(msg) {
      const el = document.getElementById('registerError');
      el.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
      el.classList.add('active');
    }

    function showRegister() {
      document.querySelector('.login-container:first-child').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    }

    function showLogin() {
      document.querySelector('.login-container:first-child').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    }
  </script>
</body>
</html>
